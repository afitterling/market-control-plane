<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.35">
    <path d="M0 100 L1200 100" stroke="#1E40AF" stroke-width="0.5"/>
    <path d="M0 200 L1200 200" stroke="#1E40AF" stroke-width="0.5"/>
    <path d="M0 300 L1200 300" stroke="#1E40AF" stroke-width="0.5"/>
    <path d="M0 400 L1200 400" stroke="#1E40AF" stroke-width="0.5"/>
    <path d="M0 500 L1200 500" stroke="#1E40AF" stroke-width="0.5"/>
  </g>

  <g transform="translate(0,430)" opacity="0.35">
    <path d="M0 80 L60 60 L120 90 L180 50 L240 70 L300 40 L360 65 L420 30 L480 55 L540 20 L600 45 L660 10 L720 30 L780 5 L840 25 L900 0 L960 20 L1020 -10 L1080 5 L1140 -20 L1200 0 L1200 200 L0 200 Z" fill="url(#grid)"/>
    <path d="M0 80 L60 60 L120 90 L180 50 L240 70 L300 40 L360 65 L420 30 L480 55 L540 20 L600 45 L660 10 L720 30 L780 5 L840 25 L900 0 L960 20 L1020 -10 L1080 5 L1140 -20 L1200 0" stroke="#22D3EE" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(80,90)">
    <rect width="56" height="56" rx="14" fill="#3B82F6"/>
    <path d="M14 38 L22 28 L30 33 L40 18 L48 24" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="40" cy="18" r="3" fill="#22D3EE"/>
  </g>

  <text x="160" y="128" fill="#E2E8F0" font-size="22" font-weight="500" letter-spacing="3">MARKET CONTROL PLANE</text>

  <text x="80" y="240" fill="white" font-size="76" font-weight="700" letter-spacing="-2">Detect regimes.</text>
  <text x="80" y="320" fill="white" font-size="76" font-weight="700" letter-spacing="-2">Read the pulse.</text>
  <text x="80" y="400" fill="url(#accent)" font-size="76" font-weight="700" letter-spacing="-2">Run the thesis.</text>

  <text x="80" y="470" fill="#94A3B8" font-size="22" font-weight="400">Realtime market intelligence with narrative-driven assessments,</text>
  <text x="80" y="500" fill="#94A3B8" font-size="22" font-weight="400">precondition gates, and LLM-ready prompts — built for capital allocation.</text>

  <g transform="translate(80,540)">
    <rect width="160" height="44" rx="22" fill="#22D3EE"/>
    <text x="80" y="29" fill="#0B1220" font-size="16" font-weight="600" text-anchor="middle">Risk-On / Off</text>
  </g>
  <g transform="translate(252,540)">
    <rect width="160" height="44" rx="22" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="80" y="29" fill="#93C5FD" font-size="16" font-weight="600" text-anchor="middle">Market Pulse</text>
  </g>
  <g transform="translate(424,540)">
    <rect width="200" height="44" rx="22" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="100" y="29" fill="#93C5FD" font-size="16" font-weight="600" text-anchor="middle">Assessments + LLM</text>
  </g>

  <g transform="translate(820,170)" opacity="0.95">
    <rect x="0" y="0" width="300" height="280" rx="20" fill="#0F172A" stroke="#1E40AF" stroke-width="1"/>
    <text x="20" y="36" fill="#94A3B8" font-size="13" letter-spacing="2">ASSESSMENT • CATALYST</text>
    <text x="20" y="68" fill="white" font-size="22" font-weight="700">EPS Crossover</text>
    <text x="20" y="92" fill="#22D3EE" font-size="13">TBLA · Q1 2026</text>

    <g transform="translate(20,118)">
      <line x1="0" y1="60" x2="260" y2="60" stroke="#1E40AF" stroke-width="0.8"/>
      <text x="-4" y="64" fill="#64748B" font-size="10" text-anchor="end">0</text>
      <polyline points="10,100 70,90 130,75 190,30 250,5" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="10"  cy="100" r="4" fill="#EF4444"/>
      <circle cx="70"  cy="90"  r="4" fill="#EF4444"/>
      <circle cx="130" cy="75"  r="4" fill="#F59E0B"/>
      <circle cx="190" cy="30"  r="5" fill="#22C55E" filter="url(#glow)"/>
      <circle cx="250" cy="5"   r="4" fill="#22C55E"/>
      <text x="10"  y="120" fill="#94A3B8" font-size="10" text-anchor="middle">-$0.08</text>
      <text x="130" y="120" fill="#94A3B8" font-size="10" text-anchor="middle">-$0.03</text>
      <text x="190" y="120" fill="#22C55E" font-size="11" font-weight="700" text-anchor="middle">+$0.20</text>
    </g>

    <text x="20" y="262" fill="#94A3B8" font-size="12">Stock surged</text>
    <text x="110" y="262" fill="#22C55E" font-size="12" font-weight="700">+37%</text>
    <text x="148" y="262" fill="#94A3B8" font-size="12">in one session.</text>
  </g>
