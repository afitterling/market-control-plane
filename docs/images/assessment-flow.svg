<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#22D3EE"/>
    </marker>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgF)"/>

  <text x="80" y="70" fill="#22D3EE" font-size="14" letter-spacing="3" font-weight="600">ASSESSMENT PIPELINE</text>
  <text x="80" y="115" fill="white" font-size="38" font-weight="700" letter-spacing="-1">Preconditions gate the LLM.</text>
  <text x="80" y="148" fill="#94A3B8" font-size="18">Every assessment is checked for fundamental depth and thesis fit before inference.</text>

  <g transform="translate(60,200)" filter="url(#card-shadow)">
    <rect width="220" height="200" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="20" y="36" fill="#22D3EE" font-size="12" letter-spacing="2" font-weight="600">1 · INPUT</text>
    <text x="20" y="68" fill="white" font-size="20" font-weight="700">Stock + Earnings</text>
    <text x="20" y="98"  fill="#94A3B8" font-size="13">· Stocks row</text>
    <text x="20" y="120" fill="#94A3B8" font-size="13">· Last 8 quarterly</text>
    <text x="20" y="138" fill="#94A3B8" font-size="13">  earnings reports</text>
    <text x="20" y="168" fill="#94A3B8" font-size="13">· Returns, margins,</text>
    <text x="20" y="186" fill="#94A3B8" font-size="13">  EPS series</text>
  </g>

  <line x1="285" y1="300" x2="335" y2="300" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(340,200)" filter="url(#card-shadow)">
    <rect width="240" height="200" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="20" y="36" fill="#22D3EE" font-size="12" letter-spacing="2" font-weight="600">2 · EVALUATE</text>
    <text x="20" y="68" fill="white" font-size="20" font-weight="700">Preconditions</text>

    <g transform="translate(20,86)" font-size="12">
      <rect x="0" y="0" width="80" height="22" rx="11" fill="#14532D"/>
      <text x="40" y="15" fill="#22C55E" font-weight="700" text-anchor="middle">REVENUE ✓</text>

      <rect x="0" y="30" width="80" height="22" rx="11" fill="#14532D"/>
      <text x="40" y="45" fill="#22C55E" font-weight="700" text-anchor="middle">EPS ✓</text>

      <rect x="90" y="0" width="100" height="22" rx="11" fill="#14532D"/>
      <text x="140" y="15" fill="#22C55E" font-weight="700" text-anchor="middle">MARGIN ✓</text>

      <rect x="90" y="30" width="100" height="22" rx="11" fill="#14532D"/>
      <text x="140" y="45" fill="#22C55E" font-weight="700" text-anchor="middle">OP-LEV ✓</text>

      <rect x="0" y="60" width="110" height="22" rx="11" fill="#451A03"/>
      <text x="55" y="75" fill="#F59E0B" font-weight="700" text-anchor="middle">ONE-TIME ?</text>

      <rect x="0" y="90" width="200" height="22" rx="11" fill="#1E3A8A"/>
      <text x="100" y="105" fill="#93C5FD" font-weight="700" text-anchor="middle">DEPTH: 8/4 quarters ✓</text>
    </g>
  </g>

  <line x1="585" y1="300" x2="635" y2="300" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(640,200)" filter="url(#card-shadow)">
    <rect width="240" height="200" rx="16" fill="#1E293B" stroke="#334155"/>
    <text x="20" y="36" fill="#22D3EE" font-size="12" letter-spacing="2" font-weight="600">3 · ELIGIBILITY</text>
    <text x="20" y="68" fill="white" font-size="20" font-weight="700">Gate</text>

    <g transform="translate(20,92)">
      <rect width="200" height="44" rx="10" fill="#052E16" stroke="#22C55E" stroke-width="1.5"/>
      <text x="100" y="22" fill="#22C55E" font-size="12" letter-spacing="2" font-weight="600" text-anchor="middle">ELIGIBLE</text>
      <text x="100" y="38" fill="#22C55E" font-size="11" text-anchor="middle">proceed with narrative</text>
    </g>
    <g transform="translate(20,150)">
      <rect width="200" height="44" rx="10" fill="#1F2937" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="100" y="22" fill="#94A3B8" font-size="11" letter-spacing="2" font-weight="600" text-anchor="middle">OR INELIGIBLE →</text>
      <text x="100" y="38" fill="#94A3B8" font-size="11" text-anchor="middle">suggest alternative path</text>
    </g>
  </g>

  <line x1="885" y1="300" x2="935" y2="300" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(940,200)" filter="url(#card-shadow)">
    <rect width="200" height="200" rx="16" fill="#0F172A" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="20" y="36" fill="#22D3EE" font-size="12" letter-spacing="2" font-weight="600">4 · PROMPT</text>
    <text x="20" y="68" fill="white" font-size="20" font-weight="700">LLM</text>

    <g transform="translate(20,86)" font-size="11" fill="#94A3B8">
      <text y="14">## Narrative</text>
      <text y="32" fill="#E2E8F0">verbatim story</text>
      <text y="54">## Eligibility</text>
      <text y="72" fill="#22C55E">depth + gates passed</text>
      <text y="94">## Preconditions</text>
      <text y="112" fill="#E2E8F0">met/unmet evidence</text>
    </g>
  </g>

  <g transform="translate(60,450)">
    <text x="0" y="0" fill="#94A3B8" font-size="13" letter-spacing="2" font-weight="600">VALUE PATH · 💰</text>
    <text x="0" y="22" fill="white" font-size="16" font-weight="600">profitable + price decline → sentiment-overcorrection</text>
    <text x="0" y="42" fill="#64748B" font-size="13">DCF · EV/EBITDA · P/FCF</text>
  </g>

  <g transform="translate(640,450)">
    <text x="0" y="0" fill="#94A3B8" font-size="13" letter-spacing="2" font-weight="600">CATALYST PATH · ⚡</text>
    <text x="0" y="22" fill="white" font-size="16" font-weight="600">loss-narrowing + ≥4 quarters → eps-crossover</text>
    <text x="0" y="42" fill="#64748B" font-size="13">Pre-crossover · At-crossover · Post-crossover</text>
  </g>

  <line x1="60" y1="495" x2="1140" y2="495" stroke="#1E293B" stroke-width="1"/>

  <text x="600" y="540" fill="#64748B" font-size="12" text-anchor="middle">
    POST /assessments/{strategy}/{narrative} · src/assessments.ts
  </text>
  <text x="600" y="562" fill="#475569" font-size="11" text-anchor="middle">
    Status &quot;prepared&quot; when eligible · &quot;ineligible&quot; with suggestedAlternative when gates fail
  </text>
</svg>
