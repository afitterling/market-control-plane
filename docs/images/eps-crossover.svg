<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="lossFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="gainFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="dot-glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgC)"/>

  <text x="80" y="80" fill="#3B82F6" font-size="14" letter-spacing="3" font-weight="600">⚡ CATALYST-BASED NARRATIVE</text>
  <text x="80" y="130" fill="#0F172A" font-size="52" font-weight="700" letter-spacing="-1.5">EPS Crossover</text>
  <text x="80" y="172" fill="#64748B" font-size="22" font-weight="400">Loss → Profit. Revenue multiple → earnings multiple. The market re-rates.</text>

  <g transform="translate(80,250)">
    <line x1="0" y1="0"   x2="1040" y2="0"   stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="60"  x2="1040" y2="60"  stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="120" x2="1040" y2="120" stroke="#0F172A" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="0" y1="180" x2="1040" y2="180" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="240" x2="1040" y2="240" stroke="#E2E8F0" stroke-width="1"/>

    <text x="-12" y="4"   fill="#94A3B8" font-size="12" text-anchor="end">+$0.30</text>
    <text x="-12" y="64"  fill="#94A3B8" font-size="12" text-anchor="end">+$0.15</text>
    <text x="-12" y="124" fill="#0F172A" font-size="12" text-anchor="end" font-weight="700">$0.00</text>
    <text x="-12" y="184" fill="#94A3B8" font-size="12" text-anchor="end">-$0.05</text>
    <text x="-12" y="244" fill="#94A3B8" font-size="12" text-anchor="end">-$0.10</text>

    <rect x="0"   y="120" width="650" height="140" fill="url(#lossFill)"/>
    <rect x="650" y="0"   width="390" height="120" fill="url(#gainFill)"/>

    <text x="325" y="290" fill="#EF4444" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">PRE-CROSSOVER · LOSSES NARROWING</text>
    <text x="845" y="290" fill="#22C55E" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">POST-CROSSOVER · RE-RATING</text>

    <line x1="650" y1="-20" x2="650" y2="260" stroke="#0F172A" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="650" y="-30" fill="#0F172A" font-size="13" text-anchor="middle" font-weight="700">CROSSOVER</text>

    <polyline points="40,212 200,196 360,180 520,156 650,120 810,40 970,20"
              fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g>
      <circle cx="40"  cy="212" r="7" fill="white" stroke="#EF4444" stroke-width="3"/>
      <circle cx="200" cy="196" r="7" fill="white" stroke="#EF4444" stroke-width="3"/>
      <circle cx="360" cy="180" r="7" fill="white" stroke="#F59E0B" stroke-width="3"/>
      <circle cx="520" cy="156" r="7" fill="white" stroke="#F59E0B" stroke-width="3"/>
      <circle cx="650" cy="120" r="9" fill="#FACC15" filter="url(#dot-glow)"/>
      <circle cx="650" cy="120" r="6" fill="white" stroke="#FACC15" stroke-width="3"/>
      <circle cx="810" cy="40"  r="8" fill="white" stroke="#22C55E" stroke-width="3"/>
      <circle cx="970" cy="20"  r="8" fill="white" stroke="#22C55E" stroke-width="3"/>
    </g>

    <g font-size="11" fill="#475569" text-anchor="middle">
      <text x="40"  y="232">-$0.08</text>
      <text x="200" y="216">-$0.05</text>
      <text x="360" y="200">-$0.03</text>
      <text x="520" y="176">-$0.01</text>
      <text x="650" y="105" fill="#0F172A" font-weight="700">$0.00</text>
      <text x="810" y="26"  fill="#22C55E" font-weight="700">+$0.20</text>
      <text x="970" y="6"   fill="#22C55E" font-weight="700">+$0.28</text>
    </g>
  </g>

  <g transform="translate(80,580)">
    <rect width="14" height="14" rx="3" fill="#0F172A"/>
    <text x="22" y="12" fill="#475569" font-size="13">EPS trajectory · TBLA Q1 2026</text>
    <rect x="320" y="0" width="14" height="14" rx="3" fill="#FACC15"/>
    <text x="342" y="12" fill="#475569" font-size="13">Crossover quarter — consensus beat triggers re-rating</text>
    <rect x="800" y="0" width="14" height="14" rx="3" fill="#22C55E"/>
    <text x="822" y="12" fill="#22C55E" font-size="13" font-weight="700">Stock +37% in one session</text>
  </g>
</svg>
